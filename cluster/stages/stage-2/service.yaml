---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: networkpolicies
  namespace: argocd
  annotations:
    description: "Network access policies for database, Jenkins, and ArgoCD"
spec:
  destination:
    namespace: default
    server: 'https://kubernetes.default.svc'
  source:
    path: infrastructure/networkpolicies
    repoURL: 'https://github.com/YOUR_GITHUB_USERNAME/homelab-infra'
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
