apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cni
  namespace: argocd
spec:
  destination:
    namespace: default
    server: 'https://kubernetes.default.svc'
  source:
    path: infrastructure/cni
    repoURL: 'https://github.com/YOUR_GITHUB_USERNAME/homelab-infra'
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
spec:
  destination:
    namespace: default
    server: 'https://kubernetes.default.svc'
  source:
    path: infrastructure/namespaces
    repoURL: 'https://github.com/YOUR_GITHUB_USERNAME/homelab-infra'
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nfs
  namespace: argocd
spec:
  destination:
    namespace: default
    server: 'https://kubernetes.default.svc'
  source:
    path: infrastructure/nfs
    repoURL: 'https://github.com/YOUR_GITHUB_USERNAME/homelab-infra'
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-crds
  namespace: argocd
spec:
  destination:
    namespace: default
    server: 'https://kubernetes.default.svc'
  source:
    chart: prometheus-operator-crds
    # version number from: helm search repo grafana
    targetRevision: '^14.0.0'
    repoURL: https://prometheus-community.github.io/helm-charts
    helm:
      releaseName: prometheus-operator-crds
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  destination:
    namespace: default
    server: 'https://kubernetes.default.svc'
  source:
    path: infrastructure/argocd
    repoURL: 'https://github.com/YOUR_GITHUB_USERNAME/homelab-infra'
    targetRevision: main
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---