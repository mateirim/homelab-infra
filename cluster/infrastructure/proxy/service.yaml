# loki-stack helm-chart deployment
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-ingress
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: proxy
  syncPolicy:
    automated:
      selfHeal: true
  sources:
  - targetRevision: 'main'
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/homelab-infra
    ref: myRepo
  - chart: ingress-nginx
    # version number from: helm search repo ingress-nginx
    targetRevision: '^4.7.1'
    repoURL: https://kubernetes.github.io/ingress-nginx
    helm:
      releaseName: ingress-nginx
      valueFiles:
        - $myRepo/infrastructure/proxy/nginx-values.yaml