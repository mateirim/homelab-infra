apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data-pvc
  namespace: grafana
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs
  volumeName: grafana-data-pv
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: grafana-data-pv
  namespace: grafana
spec:
  storageClassName: "nfs"
  accessModes:
    - ReadWriteOnce
  capacity:
    storage: 50Gi
  volumeMode: Filesystem
  claimRef:
    name: grafana-data-pvc
    namespace: grafana
  mountOptions:
    - hard
    - nfsvers=4.1
  nfs:
    path: /nfs/data/grafana
    server: REPLACE_WITH_NFS_SERVER
