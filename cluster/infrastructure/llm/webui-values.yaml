
nameOverride: "llm"
hostNetwork: true
tika:
  # -- Automatically install Apache Tika to extend Open WebUI
  enabled: true
  image:
    repository: apache/tika
    tag: "latest-full"
    pullPolicy: IfNotPresent
  resources: {}
ollama:
  # -- Automatically install Ollama Helm chart from https://otwld.github.io/ollama-helm/. Use [Helm Values](https://github.com/otwld/ollama-helm/#helm-values) to configure
  enabled: true
  hostNetwork: true
  image:
    tag: "latest"
  # -- If enabling embedded Ollama, update fullnameOverride to your desired Ollama name value, or else it will use the default ollama.name value from the Ollama chart
  fullnameOverride: "open-webui-ollama"
  # -- Example Ollama configuration with nvidia GPU enabled, automatically downloading a model, and deploying a PVC for model persistence
  gpu:
    enabled: true
    type: 'nvidia'
    number: 1
  insecure: true

  runtimeClassName: nvidia
  resources: {}
  persistentVolume:
    enabled: true
    volumeName: "llm-pv"
    storageClass: "nfs-omv"
  tolerations:
    - key: "gpu/true"
      operator: "Exists"
      effect: "PreferNoSchedule"
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: nvidia.com/gpu
            operator: In
            values:
            - "true"
  service:

    # -- Service type
    type: LoadBalancer
  autoscaling:
    # -- Enable autoscaling
    enabled: true
    maxReplicas: 5
    # -- Number of minimum replicas
    minReplicas: 1
  ingress:
    # -- Enable ingress controller resource
    enabled: true
    className: "nginx"
    annotations:
      kubernetes.io/ingress.class: nginx
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: letsencrypt-prod
      cert-manager.io/issue-temporary-certificate: "true"
    hosts:
      - host: ollama.REPLACE_WITH_YOUR_DOMAIN
        paths:
          - path: /
            pathType: Prefix
      - host: ollama-global.REPLACE_WITH_YOUR_DOMAIN
        paths:
          - path: /
            pathType: Prefix
    # --  The tls configuration for hostnames to be covered with this ingress record.
    tls:
     - secretName: ollama-tls
       hosts:
         - ollama.REPLACE_WITH_YOUR_DOMAIN
     - secretName: ollama-global-tls
       hosts:
         - ollama-global.REPLACE_WITH_YOUR_DOMAIN

  extraEnv:
   - name: OLLAMA_DEBUG
     value: "2"
   - name: OLLAMA_CONTEXT_LENGTH
     value: "32768"
   - name: OLLAMA_FLASH_ATTENTION
     value: "1"
   - name: OLLAMA_KV_CACHE_TYPE
     value: "q8_0"

  extraObjects: []


pipelines:
  # -- Automatically install Pipelines chart to extend Open WebUI functionality using Pipelines: https://github.com/open-webui/pipelines
  enabled: true
  resources: {}
  # -- This section can be used to pass required environment variables to your pipelines (e.g. Langfuse hostname)
  extraEnvVars: []

# -- A list of Ollama API endpoints. These can be added in lieu of automatically installing the Ollama Helm chart, or in addition to it.
# ollamaUrls: ["http://open-webui-ollama.llm.svc.cluster.local:11434"]

# -- Value of cluster domain
clusterDomain: cluster.local

annotations: {}
podAnnotations: {}
replicaCount: 1
# -- Open WebUI image tags can be found here: https://github.com/open-webui/open-webui/pkgs/container/open-webui
image:
  repository: ghcr.io/open-webui/open-webui
  tag: "latest"
  pullPolicy: "IfNotPresent"
  useSlim: true

# -- Configure imagePullSecrets to use private registry
# ref: <https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry>
imagePullSecrets: []
# imagePullSecrets:
# - name: myRegistryKeySecretName

resources: {}
ingress:
  enabled: true
  class: "nginx"
  # -- Use appropriate annotations for your Ingress controller, e.g., for NGINX:
  # nginx.ingress.kubernetes.io/rewrite-target: /
  annotations:
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: "true"
    cert-manager.io/issue-temporary-certificate: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: "webui.REPLACE_WITH_YOUR_DOMAIN"
  tls: true
  existingSecret: ""

startupProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  failureThreshold: 60
  periodSeconds: 10

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

persistence:
  enabled: true
  size: 100Gi
  # -- Use existingClaim if you want to re-use an existing Open WebUI PVC instead of creating a new one
  existingClaim: "webui-pvc"
  # -- If using multiple replicas, you must update accessModes to ReadWriteMany
  accessModes:
    - ReadWriteOnce
  storageClass: "nfs-omv"
  selector: {}
  annotations: {}

# -- Node labels for pod assignment.
nodeSelector: {}

# -- Tolerations for pod assignment
# -- Affinity for pod assignment
affinity: {}

# -- Topology Spread Constraints for pod assignment
topologySpreadConstraints: []

# -- Service values to expose Open WebUI pods to cluster
service:
  type: LoadBalancer
  annotations: {}
  port: "80"
  nodePort: ""
  labels: {}
  loadBalancerClass: ""

# -- OpenAI base API URL to use. Defaults to the Pipelines service endpoint when Pipelines are enabled, and "https://api.openai.com/v1" if Pipelines are not enabled and this value is blank
openaiBaseApiUrl: ""

# -- Additional environments variables on the output Deployment definition. Most up-to-date environment variables can be found here: https://docs.openwebui.com/getting-started/env-configuration/
extraEnvVars:
  # -- Default API key value for Pipelines. Should be updated in a production deployment, or be changed to the required API key if not using Pipelines
  - name: OPENAI_API_KEY
    valueFrom:
            secretKeyRef:
              name: llm-secrets
              key: OPENAI_API_KEY
  # - name: WEBUI_SECRET_KEY
  #   value: 
  # valueFrom:
  #   secretKeyRef:
  #     name: pipelines-api-key
  #     key: api-key
  # - name: OPENAI_API_KEY
  #   valueFrom:
  #     secretKeyRef:
  #       name: openai-api-key
  #       key: api-key
  - name: OLLAMA_DEBUG
    value: "1"

# -- Configure pod security context
# ref: <https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-containe>
podSecurityContext:
  {}
  # fsGroupChangePolicy: Always
  # sysctls: []
  # supplementalGroups: []
  # fsGroup: 1001

# -- Configure container security context
# ref: <https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-containe>
containerSecurityContext:
  {}
  # runAsUser: 1001
  # runAsGroup: 1001
  # runAsNonRoot: true
  # privileged: false
  # allowPrivilegeEscalation: false
  # readOnlyRootFilesystem: false
  # capabilities:
  #   drop:
  #     - ALL
