apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inadyn-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: wireguard-system
  syncPolicy:
    automated:
      selfHeal: true
  sources:
  - targetRevision: 'main'
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/homelab-infra
    ref: myRepo
  - chart: inadyn
    # version number from: helm search repo wireguard-system
    targetRevision: '1.1.0'
    repoURL: https://charts.philippwaller.com
    helm:
      releaseName: inadyn
      valueFiles:
        - $myRepo/infrastructure/wireguard/inadyn-values.yaml
