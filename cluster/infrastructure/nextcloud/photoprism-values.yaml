image:
  repository: docker.io/photoprism/photoprism
  tag: "latest"

ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/tls-acme: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 100G
  hosts:
    - host: photoprism.REPLACE_WITH_YOUR_DOMAIN
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: photoprism-tls
      hosts:
        - photoprism.REPLACE_WITH_YOUR_DOMAIN

persistence:
  originals:
    enabled: true
    existingClaim: photoprism-pvc
    subPath: originals
  storage:
    enabled: true
    existingClaim: photoprism-pvc
    subPath: storage

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false
  allowPrivilegeEscalation: true
  capabilities:
    add:
      - SETUID
      - SETGID

config:
  PHOTOPRISM_UID: "1000"
  PHOTOPRISM_GID: "1000"
  PHOTOPRISM_PASSWORD_LENGTH: "6"

startupProbe:
  enabled: true
  httpGet:
    path: /
    port: 2342
  failureThreshold: 60
  periodSeconds: 10

livenessProbe:
  enabled: true
  httpGet:
    path: /
    port: 2342
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /
    port: 2342
  initialDelaySeconds: 10
  periodSeconds: 10

# Optional: uncomment to pin PhotoPrism to a specific node
# nodeSelector:
#   workload-type: storage
