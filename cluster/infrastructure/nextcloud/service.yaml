# nextcloud-stack helm-chart deployment
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nextcloud-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: "https://kubernetes.default.svc"
    namespace: nextcloud
  syncPolicy:
    automated:
      selfHeal: true
  sources:
  - targetRevision: 'main'
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/homelab-infra
    ref: myRepo
  - chart: nextcloud
    # version number from: helm search repo nextcloud
    targetRevision: '^6.2.2'
    repoURL: https://nextcloud.github.io/helm/
    helm:
      releaseName: nextcloud
      valueFiles:
        - $myRepo/infrastructure/nextcloud/nextcloud-values.yaml
  - chart: photoprism-pro
    targetRevision: '^1.0.3'
    repoURL: https://charts.photoprism.app/photoprism
    helm:
      releaseName: photoprism
      valueFiles:
        - $myRepo/infrastructure/nextcloud/photoprism-values.yaml
  - chart: photoprism-pro
    targetRevision: '^1.0.3'
    repoURL: https://charts.photoprism.app/photoprism
    helm:
      releaseName: photoprism-2
      valueFiles:
        - $myRepo/infrastructure/nextcloud/photoprism-2-values.yaml