persistence:
  config:
    enabled: truel
    size: 200Gi
    existingClaim: homeassistant-config
  dbus:
    enabled: true
    type: hostPath
    hostPath: /run/dbus
    readOnly: true
  dev:
    enabled: true
    type: hostPath
    hostPath: /dev/ttyACM0
    mountPath: /dev/ttyACM0
    readOnly: false
  serial:
    enabled: true
    type: hostPath
    hostPath: /dev/serial/by-id
    mountPath: /dev/serial/by-id
    readOnly: false
metrics:
  # -- Enable and configure a Prometheus serviceMonitor.
  # @default -- See values.yaml
  enabled: true
addons:
  # -- Enable and configure codeserver for the chart.
  #    This allows for easy access to configuration.yaml
  # @default -- See values.yaml
  codeserver:
    enabled: true
    args:
      - --auth
      - none
      - --user-data-dir
      - /data/config/.vscode
    volumeMounts:
      - name: config
        mountPath: /data/config
securityContext:
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false  # Home Assistant needs to write to /data/config
  capabilities:
    add:
      - NET_ADMIN  # For network device access (Zigbee, Bluetooth USB)
    drop:
      - ALL
image:
  tag: "2025.1.1"
  pullPolicy: IfNotPresent
ingress:
  # -- Enable and configure ingress settings for the chart under this key.
  # @default -- See values.yaml
  main:
    enabled: true
    annotations: 
      kubernetes.io/ingress.class: nginx
      kubernetes.io/tls-acme: "true"
      cert-manager.io/cluster-issuer: letsencrypt-prod
      cert-manager.io/issue-temporary-certificate: "true"
    hosts:
      - # -- Host address. Helm template can be passed.
        host: ha.REPLACE_WITH_YOUR_DOMAIN
        ## Configure the paths for the host
        paths:
          - # -- Path.  Helm template can be passed.
            path: /
            pathType: Prefix
            service:
              # -- Overrides the service name reference for this path
              # This can be an actual service name, or reference a service identifier
              # from this values.yaml
              name: homeassistant
    tls:
    - secretName: ha-tls
      hosts:
        #- virtualHost (default value is pi.hole) will be appended to the hosts
        - ha.REPLACE_WITH_YOUR_DOMAIN
