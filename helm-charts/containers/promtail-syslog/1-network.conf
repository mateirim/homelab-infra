@define allow-config-dups 1
options {
    flush_lines (0);
    time_reopen (10);
    log_fifo_size (1000);
    chain_hostnames (off);
    use_dns (no);
    use_fqdn (no);
    create_dirs (no);
    keep_hostname (yes);
};
source s_network {
     network(ip(0.0.0.0) port(1514) transport("udp"));
     network(ip(0.0.0.0) port(1514) transport("tcp"));
};
destination d_linux_logs {
     file(
         "/var/log/networklogs/${HOST}/${MONTH}/${DAY}-syslog.log"
         owner("root")
         group("root")
         perm(0755)
         dir_perm(0755)
         create_dirs(yes)
         );
     };
# Rule defined to save the Linux logs
log {
    source(s_network); destination(d_linux_logs);
};
